name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v0.0.3

# 需要写权限才能创建 Release
permissions:
  contents: write

jobs:
  # ── macOS 构建 ──
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci || npm ci

      - name: Import Code Signing Certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo $CSC_LINK | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings build.keychain
          security import certificate.p12 -k build.keychain -P $CSC_KEY_PASSWORD -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build & Sign (macOS ${{ matrix.arch }})
        run: |
          npx vite build
          npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Notarize DMG
        run: |
          DMG=$(ls release/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            echo "Notarizing $DMG..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize ZIP
        run: |
          ZIP=$(ls release/*.zip 2>/dev/null | head -1)
          if [ -n "$ZIP" ]; then
            echo "Notarizing $ZIP..."
            xcrun notarytool submit "$ZIP" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          fi
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Rename artifacts (spaces to hyphens)
        run: |
          cd release
          for f in *; do
            nf=$(echo "$f" | tr ' ' '-')
            if [ "$f" != "$nf" ]; then
              echo "Renaming '$f' -> '$nf'"
              mv "$f" "$nf"
            fi
          done
          echo "=== Final release contents ==="
          ls -la

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          retention-days: 5

  # ── Windows 构建 ──
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci || npm ci

      - name: Build & Package (Windows)
        run: |
          npx vite build
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts (spaces to hyphens)
        shell: bash
        run: |
          cd release
          for f in *; do
            nf=$(echo "$f" | tr ' ' '-')
            if [ "$f" != "$nf" ]; then
              echo "Renaming '$f' -> '$nf'"
              mv "$f" "$nf"
            fi
          done
          ls -la

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          retention-days: 5

  # ── 创建 Release 并上传 ──
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Delete ALL existing releases for this tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Cleaning all releases for $TAG..."
          gh release list --limit 50 --json tagName,isDraft,databaseId \
            | jq -r ".[] | select(.tagName==\"$TAG\") | .databaseId" \
            | while read id; do
                echo "Deleting release $id"
                gh api -X DELETE /repos/${{ github.repository }}/releases/$id
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flatten artifacts (deduplicate, clean)
        run: |
          mkdir -p upload
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.yml' -o -name '*.blockmap' \) \
            ! -name 'builder-debug.yml' | while read f; do
            bn=$(basename "$f")
            if [ ! -f "upload/$bn" ]; then
              cp "$f" "upload/$bn"
            else
              echo "SKIP duplicate: $bn"
            fi
          done
          echo "=== Files to release ==="
          ls -la upload/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
